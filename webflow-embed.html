<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/amitsharm/workshop-assets@main/workshop.css">
<div id="workshop-container"></div>
<script>
  fetch('https://cdn.jsdelivr.net/gh/amitsharm/workshop-assets@main/workshop-embed.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('workshop-container').innerHTML = html;
      // Load workshop JS after HTML is injected
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/gh/amitsharm/workshop-assets@main/workshop.js';
      document.body.appendChild(s);
    });
</script>
